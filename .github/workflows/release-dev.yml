name: Dev Release

on:
  push:
    branches:
      - main

jobs:
  release-dev:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=$(date +%Y.%m.%d).${{ github.run_number }}" >> $GITHUB_ENV

      - name: Fetch yt-dlp
        run: bash scripts/fetch-yt-dlp.sh

      - name: Build
        run: |
          xcodebuild \
            -project app/SchlonkPad.xcodeproj \
            -scheme SchlonkPad \
            -configuration Release \
            PRODUCT_BUNDLE_IDENTIFIER="com.crux.schlonk-pad.dev" \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            build

      - name: Patch app for dev channel
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleDisplayName 'schlonk-pad (dev)'" \
            "build/SchlonkPad.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleShortVersionString '${{ env.VERSION }}'" \
            "build/SchlonkPad.app/Contents/Info.plist"
          mv "build/SchlonkPad.app" "build/SchlonkPad Dev.app"

      - name: Package DMG
        run: |
          hdiutil create \
            -volname "schlonk-pad (dev)" \
            -srcfolder "build/SchlonkPad Dev.app" \
            -ov -format UDZO \
            "build/SchlonkPad-dev-${{ env.VERSION }}.dmg"

      - name: Publish dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes 2>/dev/null || true
          git push origin :refs/tags/dev 2>/dev/null || true
          gh release create dev \
            --prerelease \
            --title "Development Build ${{ env.VERSION }}" \
            --notes "Latest development build from main. Unstable." \
            "build/SchlonkPad-dev-${{ env.VERSION }}.dmg"

      - name: Update Homebrew dev cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ env.VERSION }}
          SHA=$(shasum -a 256 "build/SchlonkPad-dev-${VERSION}.dmg" | cut -d' ' -f1)

          git clone \
            https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/crux/homebrew-tap.git

          bash scripts/write-cask-dev.sh "$VERSION" "$SHA" homebrew-tap/Casks/schlonk-pad-dev.rb

          cd homebrew-tap
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add Casks/schlonk-pad-dev.rb
          git commit -m "schlonk-pad-dev ${VERSION}"
          git push
